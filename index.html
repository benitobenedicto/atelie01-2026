<html>
  <head>
    <title>Minha terceira experiencia de RA usando o AR.js e o AFrame, com meu marcador imagem.</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden">
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
      <a-marker type="pattern" url="pattern-grid-01.patt>
<a-image src="bandeira.png" position="0 0.5 0" rotation="-90 0 0" width="1.5" height="1"> </a-image>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
  
</html>
